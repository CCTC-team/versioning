name: Versioning EM Cypress Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref, so
# stacked pushes don't each consume a full run of Actions minutes.
concurrency:
  group: cypress-${{ github.ref }}
  cancel-in-progress: true

env:
  CCTC_DOCKER_REF: "v1.0.0"
  CYPRESS_REF: "cctc_v1.0.2"
  EM_NAME: "versioning"
  EM_VERSION: "v1.0.1"

jobs:
  cypress-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout Versioning EM
        uses: actions/checkout@v4
        with:
          path: versioning_em

      - name: Clone redcap_cypress
        env:
          GH_PAT: ${{ secrets.CCTC_TEAM_PAT }}
        run: |
          git clone --branch ${{ env.CYPRESS_REF }} --depth=1 \
            https://x-access-token:${GH_PAT}@github.com/CCTC-team/redcap_cypress.git
          cd redcap_cypress && git log -1

      - name: Read config from cypress.env.json.example
        working-directory: redcap_cypress
        run: |
          REDCAP_VERSION=$(jq -r '.redcap_version' cypress.env.json.example)
          DB_CONTAINER=$(jq -r '.mysql.docker_container' cypress.env.json.example)
          DB_HOST=$(jq -r '.mysql.host' cypress.env.json.example)
          DB_PORT=$(jq -r '.mysql.port' cypress.env.json.example)

          echo "REDCAP_VERSION=${REDCAP_VERSION}" >> $GITHUB_ENV
          echo "DB_CONTAINER=${DB_CONTAINER}" >> $GITHUB_ENV
          echo "DB_HOST=${DB_HOST}" >> $GITHUB_ENV
          echo "DB_PORT=${DB_PORT}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: redcap_cypress/package-lock.json

      - name: Cache Cypress binary
        # setup-node caches npm *packages* but not the (~hundreds of MB) Cypress
        # binary, which npm ci re-downloads every run. Cache it keyed on the
        # lockfile so it's restored instead of re-downloaded.
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-binary-${{ runner.os }}-${{ hashFiles('redcap_cypress/package-lock.json') }}
          restore-keys: |
            cypress-binary-${{ runner.os }}-

      - name: Clone CCTC_REDCap_Docker
        env:
          GH_PAT: ${{ secrets.CCTC_TEAM_PAT }}
        run: |
          git clone --branch ${{ env.CCTC_DOCKER_REF }} --depth=1 \
            https://x-access-token:${GH_PAT}@github.com/CCTC-team/CCTC_REDCap_Docker.git
          cd CCTC_REDCap_Docker && git log -1

      - name: Get REDCap Source
        env:
          GH_PAT: ${{ secrets.CCTC_TEAM_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error::No PAT available for cloning CCTC-team/redcap_source."
            echo "Set repo secret CCTC_TEAM_PAT on this repository."
            exit 1
          fi

          if [[ "${{ env.REDCAP_VERSION }}" = "99.99.99" ]]; then
            export BRANCH=main
          else
            export BRANCH=${{ env.REDCAP_VERSION }}
          fi

          # Verify the PAT can actually see redcap_source before attempting the clone,
          # so a permission problem produces an explicit error instead of git's generic
          # "Invalid username or token" message.
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/CCTC-team/redcap_source)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::CCTC_TEAM_PAT cannot access CCTC-team/redcap_source (HTTP $HTTP_CODE)."
            echo "Grant CCTC_TEAM_PAT 'Contents: Read' access to CCTC-team/redcap_source."
            exit 1
          fi

          cd CCTC_REDCap_Docker/redcap_source

          git clone --depth=1 --branch=$BRANCH \
            https://x-access-token:${GH_PAT}@github.com/CCTC-team/redcap_source.git _clone
          git -C _clone log -1

          cp -a _clone/* _clone/.* . 2>/dev/null || true
          rm -rf _clone .git

          echo "=== redcap_source contents ==="
          ls -la

      - name: Inject Versioning EM under test
        run: |
          TARGET="CCTC_REDCap_Docker/redcap_source/modules/${{ env.EM_NAME }}_${{ env.EM_VERSION }}"
          rm -rf "$TARGET"
          mkdir -p "$(dirname "$TARGET")"
          cp -a versioning_em "$TARGET"
          rm -rf "$TARGET/.git" "$TARGET/.github"
          echo "=== EM injected at $TARGET ==="
          ls -la "$TARGET"

      - name: Symlink redcap_source to workspace root for Cypress
        run: ln -s CCTC_REDCap_Docker/redcap_source redcap_source

      - name: Build and start Docker services
        run: |
          cd CCTC_REDCap_Docker/redcap_docker

          cp .env.example .env
          sed -i 's/REDCAP_VERSION=.*/REDCAP_VERSION=${{ env.REDCAP_VERSION }}/' .env

          echo "=== .env ==="
          cat .env

          docker compose build
          docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for MariaDB to be ready..."
          timeout 120 bash -c 'until docker exec ${{ env.DB_CONTAINER }} mysqladmin ping -h localhost --silent 2>/dev/null; do sleep 2; done'

          echo "Waiting for REDCap to be ready..."
          timeout 120 bash -c 'until curl -k -s -f https://localhost:8443 > /dev/null 2>&1; do sleep 2; done'

          echo "Services are ready!"
          docker ps -a

      - name: Set permissions for eDocs & Temp folders
        run: |
          mkdir -p CCTC_REDCap_Docker/redcap_source/edocs
          mkdir -p CCTC_REDCap_Docker/redcap_source/temp
          sudo chmod -R 777 CCTC_REDCap_Docker/redcap_source/edocs
          sudo chmod -R 777 CCTC_REDCap_Docker/redcap_source/temp

      - name: Configure Cypress environment
        working-directory: redcap_cypress
        env:
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        run: |
          sed "s/PID/$PROJECT_ID/g" cypress.config.js.example > cypress.config.js
          cp cypress.env.json.example cypress.env.json

          sed -i '/"path":/c\    "path": "docker exec -i ${{ env.DB_CONTAINER }} mysql",' cypress.env.json
          sed -i '/"port":/c\    "port": "3306",' cypress.env.json

          sed -i '/"temp_folder":/a\  "edocs_folder": "${{ github.workspace }}/CCTC_REDCap_Docker/redcap_source/edocs",' cypress.env.json
          sed -i '/"redcap_version":/a\  "redcap_source_path": "${{ github.workspace }}/CCTC_REDCap_Docker/redcap_source",' cypress.env.json

          echo "=== cypress.env.json ==="
          cat cypress.env.json

      - name: Install Cypress and dependencies
        working-directory: redcap_cypress
        run: |
          # npm ci installs exactly the committed package-lock.json (deterministic,
          # matched esbuild) instead of `npm install` + `redcap_rsvc:install`, whose
          # `clean` deleted package-lock.json and reinstalled lockless — that drift
          # caused esbuild's "Expected id 3 but got id 2" crash at config load.
          npm ci
          # move_files copies redcap_rsvc/Files fixtures into cypress/fixtures (most
          # fixtures live in redcap_rsvc, not the EM repo). Non-destructive half of
          # redcap_rsvc:install — keeps the lockfile. Without it cypress/fixtures is
          # empty and specs hang until the stall watchdog kills CI.
          npm run redcap_rsvc:move_files

      - name: Build EM-scoped spec list (E.122.*)
        id: specs
        working-directory: redcap_cypress
        run: |
          find ../redcap_source/modules/${{ env.EM_NAME }}_${{ env.EM_VERSION }}/automated_tests \
               -type f -name 'E.122.*.feature' ! -iname '*REDUNDANT*' \
            | sort -u > shard-specs.txt
          SPEC_COUNT=$(wc -l < shard-specs.txt | tr -d ' ')
          echo "spec_count=${SPEC_COUNT}" >> $GITHUB_OUTPUT
          echo "Will run ${SPEC_COUNT} versioning specs:"
          cat shard-specs.txt

      - name: Run Cypress tests for Versioning EM
        if: steps.specs.outputs.spec_count != '0'
        working-directory: redcap_cypress
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_prettyEnabled: 'true'
          CYPRESS_BROWSER: chrome
          CYPRESS_MAX_ATTEMPTS: '3'
          CYPRESS_GROUP_PREFIX: versioning-em
          CYPRESS_DISABLE_RECORDING: '1'
          # Watchdog: if no new spec report appears for 15 min, treat as hung.
          CYPRESS_STALL_MS: '900000'
        run: |
          export UID
          npm run test:retry-failed -- --spec-file shard-specs.txt

      - name: Generate combined HTML report
        if: always()
        working-directory: redcap_cypress
        run: |
          if ls cypress/results/json/*.json >/dev/null 2>&1; then
            npm run report
            REPORT_BASENAME="${{ env.EM_NAME }}_${{ env.EM_VERSION }}-test-report"
            mv cypress/results/test-report.json "cypress/results/${REPORT_BASENAME}.json"
            mv cypress/results/html/test-report.html "cypress/results/html/${REPORT_BASENAME}.html"
            echo "Renamed merged report to ${REPORT_BASENAME}.{json,html}"
          else
            echo "::warning::No mochawesome JSON files were produced — Cypress likely failed before any spec ran."
          fi

      - name: Upload mochawesome reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.EM_NAME }}_${{ env.EM_VERSION }}-cypress-results
          path: |
            redcap_cypress/cypress/results/json/*.json
            redcap_cypress/cypress/results/${{ env.EM_NAME }}_${{ env.EM_VERSION }}-test-report.json
            redcap_cypress/cypress/results/html/${{ env.EM_NAME }}_${{ env.EM_VERSION }}-test-report.html
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ${{ env.EM_NAME }}_${{ env.EM_VERSION }}-cypress-screenshots
          path: redcap_cypress/cypress/screenshots/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          cd CCTC_REDCap_Docker/redcap_docker
          docker compose down -v

  # Prune Actions artifact storage: keep only the N most recent workflow runs'
  # artifacts and delete everything older, to stay under the org's 2 GB Actions
  # storage quota. Runs after the test job so the current run's artifacts
  # already exist and are counted among the kept runs.
  prune-artifacts:
    needs: cypress-tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    env:
      KEEP_RUNS: "2"   # keep the latest run + the one before it
    steps:
      - name: Delete artifacts from older runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # Distinct run IDs that still have live artifacts, newest first
          RUN_IDS=$(gh api "repos/${REPO}/actions/artifacts" --paginate \
            --jq '.artifacts[] | select(.expired==false) | [.workflow_run.id, .created_at] | @tsv' \
            | awk -F'\t' '{ if($2>seen[$1]) seen[$1]=$2 } END { for(r in seen) print seen[r]"\t"r }' \
            | sort -r | awk -F'\t' '{print $2}')

          KEEP_SET=$(echo "$RUN_IDS" | head -n "$KEEP_RUNS" | paste -sd, -)
          echo "Keeping artifacts from runs: ${KEEP_SET:-<none>}"

          gh api "repos/${REPO}/actions/artifacts" --paginate \
            --jq '.artifacts[] | select(.expired==false) | [.workflow_run.id, .id, .name] | @tsv' \
            | while IFS=$'\t' read -r runid artid name; do
                case ",$KEEP_SET," in
                  *",$runid,"*) ;;  # within the keep window — leave it
                  *)
                    echo "Deleting $name (run $runid, artifact $artid)"
                    gh api -X DELETE "repos/${REPO}/actions/artifacts/${artid}" \
                      && echo "  ok" || echo "  failed (continuing)"
                    ;;
                esac
              done
