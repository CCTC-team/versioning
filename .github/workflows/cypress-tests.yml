name: Versioning EM Cypress Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref, so
# stacked pushes don't each consume a full run of Actions minutes.
concurrency:
  group: cypress-${{ github.ref }}
  cancel-in-progress: true

env:
  CCTC_DOCKER_REF: "v1.0.3"
  CYPRESS_REF: "cctc_v1.0.2"
  EM_NAME: "versioning"
  EM_VERSION: "v1.0.1"
  REGISTRY: ghcr.io
  # Pinned Cypress runner image (published by redcap_cypress/build-cypress-runner.yml).
  # The suite runs INSIDE this container so the runtime is identical to local
  # run.sh/run-ci.sh and to the main harness CI.
  CYPRESS_RUNNER_IMAGE: ghcr.io/cctc-team/redcap_cypress/cypress-runner:15.10.0

jobs:
  cypress-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout Versioning EM
        uses: actions/checkout@v5
        with:
          path: versioning_em

      - name: Clone redcap_cypress
        env:
          GH_PAT: ${{ secrets.CCTC_TEAM_PAT }}
        run: |
          git clone --branch ${{ env.CYPRESS_REF }} --depth=1 \
            https://x-access-token:${GH_PAT}@github.com/CCTC-team/redcap_cypress.git
          cd redcap_cypress && git log -1

      - name: Read config from cypress.env.json.example
        working-directory: redcap_cypress
        run: |
          REDCAP_VERSION=$(jq -r '.redcap_version' cypress.env.json.example)
          DB_CONTAINER=$(jq -r '.mysql.docker_container' cypress.env.json.example)
          DB_HOST=$(jq -r '.mysql.host' cypress.env.json.example)
          DB_PORT=$(jq -r '.mysql.port' cypress.env.json.example)

          echo "REDCAP_VERSION=${REDCAP_VERSION}" >> $GITHUB_ENV
          echo "DB_CONTAINER=${DB_CONTAINER}" >> $GITHUB_ENV
          echo "DB_HOST=${DB_HOST}" >> $GITHUB_ENV
          echo "DB_PORT=${DB_PORT}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: redcap_cypress/package-lock.json

      # The Cypress binary is baked into the runner image (cypress/included), and
      # xmllint ships in it too — so the host no longer needs the binary cache or a
      # libxml2-utils install. The suite runs inside the container (see below).

      - name: Clone CCTC_REDCap_Docker
        env:
          GH_PAT: ${{ secrets.CCTC_TEAM_PAT }}
        run: |
          git clone --branch ${{ env.CCTC_DOCKER_REF }} --depth=1 \
            https://x-access-token:${GH_PAT}@github.com/CCTC-team/CCTC_REDCap_Docker.git
          cd CCTC_REDCap_Docker && git log -1

      - name: Get REDCap Source
        env:
          GH_PAT: ${{ secrets.CCTC_TEAM_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error::No PAT available for cloning CCTC-team/redcap_source."
            echo "Set repo secret CCTC_TEAM_PAT on this repository."
            exit 1
          fi

          if [[ "${{ env.REDCAP_VERSION }}" = "99.99.99" ]]; then
            export BRANCH=main
          else
            export BRANCH=${{ env.REDCAP_VERSION }}
          fi

          # Verify the PAT can actually see redcap_source before attempting the clone,
          # so a permission problem produces an explicit error instead of git's generic
          # "Invalid username or token" message.
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/CCTC-team/redcap_source)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::CCTC_TEAM_PAT cannot access CCTC-team/redcap_source (HTTP $HTTP_CODE)."
            echo "Grant CCTC_TEAM_PAT 'Contents: Read' access to CCTC-team/redcap_source."
            exit 1
          fi

          cd CCTC_REDCap_Docker/redcap_source

          git clone --depth=1 --branch=$BRANCH \
            https://x-access-token:${GH_PAT}@github.com/CCTC-team/redcap_source.git _clone
          git -C _clone log -1

          cp -a _clone/* _clone/.* . 2>/dev/null || true
          rm -rf _clone .git

          echo "=== redcap_source contents ==="
          ls -la

      - name: Inject Versioning EM under test
        run: |
          TARGET="CCTC_REDCap_Docker/redcap_source/modules/${{ env.EM_NAME }}_${{ env.EM_VERSION }}"
          rm -rf "$TARGET"
          mkdir -p "$(dirname "$TARGET")"
          cp -a versioning_em "$TARGET"
          rm -rf "$TARGET/.git" "$TARGET/.github"
          echo "=== EM injected at $TARGET ==="
          ls -la "$TARGET"

      - name: Symlink redcap_source to workspace root for Cypress
        run: ln -s CCTC_REDCap_Docker/redcap_source redcap_source

      - name: Log in to GitHub Container Registry
        run: |
          # The prebuilt redcap-env image (published by CCTC_REDCap_Docker) is a private
          # GHCR package, so authenticate before pulling. CCTC_TEAM_PAT must have
          # read:packages scope. If the package is made public, this step can be removed.
          echo "${{ secrets.CCTC_TEAM_PAT }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Pull prebuilt image and start Docker services
        env:
          # The prebuilt image bakes REDCap source at build time, so it does NOT contain
          # the EM under test. docker-compose.em.yml bind-mounts the injected EM into the
          # image's modules dir at runtime (no rebuild); the EM's own automated_tests
          # steps then enable it, exactly as the old bake-it-in build flow did.
          EM_HOST_PATH: ${{ github.workspace }}/CCTC_REDCap_Docker/redcap_source/modules/${{ env.EM_NAME }}_${{ env.EM_VERSION }}
          EM_DIR: ${{ env.EM_NAME }}_${{ env.EM_VERSION }}
        run: |
          cd CCTC_REDCap_Docker/redcap_docker

          cp .env.example .env
          sed -i 's/REDCAP_VERSION=.*/REDCAP_VERSION=${{ env.REDCAP_VERSION }}/' .env

          echo "=== .env ==="
          cat .env

          # Pull the shared prebuilt REDCap image (built by CCTC_REDCap_Docker) instead of
          # rebuilding from source — every run uses the byte-identical image, removing
          # build time and build-variance as a flakiness source. The EM under test is
          # layered in via docker-compose.em.yml (bind mount) rather than baked.
          COMPOSE="-f docker-compose.yml -f docker-compose.prebuilt.yml -f docker-compose.em.yml"

          echo "EM mounted from: $EM_HOST_PATH -> /var/www/html/modules/$EM_DIR"
          ls -la "$EM_HOST_PATH" | head

          docker compose $COMPOSE pull app

          # Start all services using the pulled image + the EM bind mount
          docker compose $COMPOSE up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for MariaDB to be ready..."
          timeout 120 bash -c 'until docker exec ${{ env.DB_CONTAINER }} mysqladmin ping -h localhost --silent 2>/dev/null; do sleep 2; done'

          echo "Waiting for REDCap to be ready..."
          timeout 120 bash -c 'until curl -k -s -f https://localhost:8443 > /dev/null 2>&1; do sleep 2; done'

          echo "Services are ready!"
          docker ps -a

      - name: Set permissions for eDocs & Temp folders
        run: |
          mkdir -p CCTC_REDCap_Docker/redcap_source/edocs
          mkdir -p CCTC_REDCap_Docker/redcap_source/temp
          sudo chmod -R 777 CCTC_REDCap_Docker/redcap_source/edocs
          sudo chmod -R 777 CCTC_REDCap_Docker/redcap_source/temp

      - name: Configure Cypress environment
        working-directory: redcap_cypress
        env:
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        run: |
          sed "s/PID/$PROJECT_ID/g" cypress.config.js.example > cypress.config.js
          cp cypress.env.json.example cypress.env.json

          sed -i '/"path":/c\    "path": "docker exec -i ${{ env.DB_CONTAINER }} mysql",' cypress.env.json
          sed -i '/"port":/c\    "port": "3306",' cypress.env.json

          sed -i '/"temp_folder":/a\  "edocs_folder": "${{ github.workspace }}/CCTC_REDCap_Docker/redcap_source/edocs",' cypress.env.json
          sed -i '/"redcap_version":/a\  "redcap_source_path": "${{ github.workspace }}/CCTC_REDCap_Docker/redcap_source",' cypress.env.json

          echo "=== cypress.env.json ==="
          cat cypress.env.json

      - name: Install Cypress and dependencies
        working-directory: redcap_cypress
        env:
          # The host only uses node_modules for spec discovery and report generation;
          # the suite itself runs inside the runner container, which has its own baked
          # Cypress binary. Skip the host binary download.
          CYPRESS_INSTALL_BINARY: '0'
        run: |
          # npm ci installs exactly the committed package-lock.json, so esbuild's
          # JS wrapper and its native @esbuild/<platform> binary always match.
          # The old `npm install` + `redcap_rsvc:install` flow ran `clean`, which
          # deleted package-lock.json and reinstalled lockless — that version drift
          # produced esbuild's "Expected id 3 but got id 2" transform crash while
          # loading cypress.config.js.
          npm ci
          # move_files copies the redcap_rsvc fixtures (cdisc_files, dictionaries,
          # import_files, schemas, expected_exports) into cypress/fixtures. This is
          # the non-destructive half of the old redcap_rsvc:install — it does NOT
          # delete package-lock.json, so the deterministic npm ci tree is preserved.
          npm run redcap_rsvc:move_files

      - name: Build EM-scoped spec list (E.122.*)
        id: specs
        working-directory: redcap_cypress
        run: |
          find ../redcap_source/modules/${{ env.EM_NAME }}_${{ env.EM_VERSION }}/automated_tests \
               -type f -name 'E.122.*.feature' ! -iname '*REDUNDANT*' \
            | sort -u > shard-specs.txt
          SPEC_COUNT=$(wc -l < shard-specs.txt | tr -d ' ')
          echo "spec_count=${SPEC_COUNT}" >> $GITHUB_OUTPUT
          echo "Will run ${SPEC_COUNT} versioning specs:"
          cat shard-specs.txt

      - name: Run Cypress tests for Versioning EM
        if: steps.specs.outputs.spec_count != '0'
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
        run: |
          # Run the suite INSIDE the pinned runner image (same image as local
          # run.sh/run-ci.sh) so the test runtime — Node, Cypress, and a Linux
          # chromium — is identical here and locally, removing host-vs-container
          # runtime drift as a flakiness source. The host scaffolding above already
          # started the REDCap stack, injected the EM, and wrote cypress.config.js /
          # cypress.env.json into the cloned harness; the container sees them via the
          # workspace bind mount.
          #
          #   --network host    -> baseUrl https://localhost:8443 reaches redcap-app,
          #                        exactly as the host-native runner did.
          #   docker socket     -> the docker-exec mysql/file tasks work unchanged.
          #   workspace at its   -> cypress.env.json's absolute ${{ github.workspace }}
          #     own path            paths (redcap_source_path, edocs) resolve inside.
          #   -w .../redcap_cypress -> the harness clone is the Cypress project root.
          docker run --rm \
            --network host \
            --shm-size=2g \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${GITHUB_WORKSPACE}":"${GITHUB_WORKSPACE}" \
            -w "${GITHUB_WORKSPACE}/redcap_cypress" \
            -e UID="$(id -u)" \
            -e CYPRESS_RECORD_KEY \
            -e CYPRESS_prettyEnabled=true \
            -e CYPRESS_BROWSER=chromium \
            -e CYPRESS_MAX_ATTEMPTS=3 \
            -e CYPRESS_GROUP_PREFIX=versioning-em \
            -e CYPRESS_DISABLE_RECORDING=1 \
            -e CYPRESS_STALL_MS=900000 \
            "${CYPRESS_RUNNER_IMAGE}" \
            npm run test:retry-failed -- --spec-file shard-specs.txt

      - name: Generate combined HTML report
        if: always()
        working-directory: redcap_cypress
        run: |
          # The suite runs inside the cypress-runner container as root, so everything
          # it wrote under cypress/results/ is root-owned. `npm run report` runs here on
          # the host as the non-root runner user and would hit EACCES writing the merged
          # report into that root-owned tree. Reclaim ownership first (passwordless sudo).
          sudo chown -R "$(id -u):$(id -g)" cypress/results 2>/dev/null || true
          if ls cypress/results/json/*.json >/dev/null 2>&1; then
            npm run report
            REPORT_BASENAME="${{ env.EM_NAME }}_${{ env.EM_VERSION }}-test-report"
            mv cypress/results/test-report.json "cypress/results/${REPORT_BASENAME}.json"
            mv cypress/results/html/test-report.html "cypress/results/html/${REPORT_BASENAME}.html"
            echo "Renamed merged report to ${REPORT_BASENAME}.{json,html}"
          else
            echo "::warning::No mochawesome JSON files were produced — Cypress likely failed before any spec ran."
          fi

      - name: Upload mochawesome reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ env.EM_NAME }}_${{ env.EM_VERSION }}-cypress-results
          path: |
            redcap_cypress/cypress/results/json/*.json
            redcap_cypress/cypress/results/${{ env.EM_NAME }}_${{ env.EM_VERSION }}-test-report.json
            redcap_cypress/cypress/results/html/${{ env.EM_NAME }}_${{ env.EM_VERSION }}-test-report.html
          retention-days: 7
          if-no-files-found: warn

      - name: Generate coverage report
        if: always()
        run: |
          if docker exec redcap-app test -f /var/www/html/phpcov.phar 2>/dev/null; then
            mkdir -p /tmp/path/coverage-report
            # Merge the per-request .cov files (written by the auto_prepend recorder
            # baked into the redcap-env image) into a single clover report INSIDE the
            # container...
            docker exec redcap-app sh -c "mkdir -p /tmp/path/coverage-report && \
              php /var/www/html/phpcov.phar merge \
                --clover /tmp/path/coverage-report/coverage.xml \
                /tmp/path/coverage" || echo "Coverage report generation failed"
            # ...then copy it out to the host, because the upload step reads the host
            # path and the container's /tmp is a separate filesystem (no bind mount).
            docker cp redcap-app:/tmp/path/coverage-report/. /tmp/path/coverage-report/ 2>/dev/null \
              || echo "No coverage report produced to copy out"
          else
            echo "phpcov.phar not found, skipping coverage report"
          fi

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ${{ env.EM_NAME }}_${{ env.EM_VERSION }}-cypress-screenshots
          path: redcap_cypress/cypress/screenshots/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ env.EM_NAME }}_${{ env.EM_VERSION }}-coverage-reports
          path: /tmp/path/coverage-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          cd CCTC_REDCap_Docker/redcap_docker
          docker compose -f docker-compose.yml -f docker-compose.prebuilt.yml down -v

  # Prune Actions artifact storage: keep only the N most recent workflow runs'
  # artifacts and delete everything older, to stay under the org's 2 GB Actions
  # storage quota. Runs after the test job so the current run's artifacts
  # already exist and are counted among the kept runs.
  prune-artifacts:
    needs: cypress-tests
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      actions: write
    env:
      KEEP_RUNS: "2"   # keep the latest run + the one before it
    steps:
      - name: Delete artifacts from older runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # Distinct run IDs that still have live artifacts, newest first
          RUN_IDS=$(gh api "repos/${REPO}/actions/artifacts" --paginate \
            --jq '.artifacts[] | select(.expired==false) | [.workflow_run.id, .created_at] | @tsv' \
            | awk -F'\t' '{ if($2>seen[$1]) seen[$1]=$2 } END { for(r in seen) print seen[r]"\t"r }' \
            | sort -r | awk -F'\t' '{print $2}')

          KEEP_SET=$(echo "$RUN_IDS" | head -n "$KEEP_RUNS" | paste -sd, -)
          echo "Keeping artifacts from runs: ${KEEP_SET:-<none>}"

          gh api "repos/${REPO}/actions/artifacts" --paginate \
            --jq '.artifacts[] | select(.expired==false) | [.workflow_run.id, .id, .name] | @tsv' \
            | while IFS=$'\t' read -r runid artid name; do
                case ",$KEEP_SET," in
                  *",$runid,"*) ;;  # within the keep window — leave it
                  *)
                    echo "Deleting $name (run $runid, artifact $artid)"
                    gh api -X DELETE "repos/${REPO}/actions/artifacts/${artid}" \
                      && echo "  ok" || echo "  failed (continuing)"
                    ;;
                esac
              done

  # Merge the suite's mochawesome JSON into ONE combined HTML report and publish it
  # to GitHub Pages, so each run links to a single browsable report (suites, failures,
  # embedded screenshots) instead of a downloadable zip.
  publish-report:
    needs: cypress-tests
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write          # publish to Pages
      id-token: write       # OIDC token deploy-pages uses to authenticate
    # Pages allows only one in-flight deployment; serialise (don't cancel) so
    # overlapping runs don't clobber each other mid-deploy.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Configure Pages
        # enablement: true turns Pages on via the API on first run, so the repo
        # doesn't need a manual Settings -> Pages change first.
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Download the suite's mochawesome results
        uses: actions/download-artifact@v8
        with:
          pattern: '*-cypress-results'   # the per-suite results artifact only
          merge-multiple: true           # flatten into one tree
          path: collected

      - name: Merge into one combined HTML report
        run: |
          shopt -s nullglob
          jsons=(collected/json/*.json)
          mkdir -p site
          if [ ${#jsons[@]} -eq 0 ]; then
            echo "::warning::No mochawesome JSON found — publishing a placeholder page."
            printf '<!doctype html><title>No results</title><h1>No test results were produced this run.</h1>' > site/index.html
          else
            echo "Merging ${#jsons[@]} per-spec JSON file(s)..."
            # Versions pinned to match package.json so the combined report renders
            # identically to the per-spec ones.
            npx --yes mochawesome-merge@5.1.1 collected/json/*.json -o collected/combined.json
            npx --yes mochawesome-report-generator@6.3.2 collected/combined.json \
              --reportDir site --reportFilename index --inline \
              --reportTitle "Versioning EM — combined report" \
              --reportPageTitle "Versioning EM Cypress results"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
